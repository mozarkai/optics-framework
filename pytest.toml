[pytest]
minversion = "9.0.0"
addopts = ["-ra", "-q", "--cov=optics_framework"]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "generate: marks tests exercising the code-generation helper (deselect with '-m \"not generate\"')",
    "white_box: unit tests that exercise a single unit with its collaborators mocked",
    "black_box: integration tests that drive real collaborators (e.g. an in-process HTTP server)",
    "hybrid: tests that span both unit and integration concerns",
]
