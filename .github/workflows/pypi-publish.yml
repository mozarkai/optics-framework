name: Upload Python Package to Pypi

on:
  release:
    types: [published]

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Install Poetry
        # Installed as a pinned, wheel-only package from PyPI (TLS-verified,
        # hash-checked by pip) instead of piping the upstream installer script
        # into python3, so no unreviewed remote script ever executes here.
        run: |
          pip install --no-cache-dir --only-binary=:all: poetry==2.4.1

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        # poetry.lock pins every dependency (including transitive ones) to an
        # exact, hash-verified version, so --sync only ever installs the
        # audited set below. Poetry's own installer builds sdist-only
        # packages via their declared PEP 517 backend rather than pip - there
        # is no --only-binary equivalent to force wheel-only installs here;
        # residual setup-script risk is accepted for this ephemeral,
        # single-purpose CI runner.
        run: poetry install --no-interaction --sync

      - name: Build package
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/optics-framework/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc
        with:
          packages-dir: dist/
