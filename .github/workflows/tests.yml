name: tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: 'pyproject.toml'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev,test

      - name: Run `optics setup`
        run: poetry run optics setup --install "EasyOCR" "Appium" "Playwright"

      # have to use `xvfb-run` because github actions doesn't have an XServer
      # tests/feature/engine/test_playwright_youtube.py uses the file from
      # optics_framework/samples/playwright/config.yaml for the config which uses headed mode
      # `xvfb-run` fixes this without having to change the config
      - name: Run tests
        run: xvfb-run poetry run pytest
