name: tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev,test

      - name: Run `optics setup`
        run: poetry run optics setup --install "EasyOCR" "Appium" "Playwright"

      - name: Run tests
        run: poetry run pytest -m "not live"
