sonar.projectKey=optics-framework

# docker:S8544 ("Python dependencies should be locked to verified versions")
# flags these four `pip install` targets even though each installs a wheel
# this same Dockerfile just built two lines earlier, or this repo's own
# checked-out source - there is no name==version to pin because there's no
# external index resolution happening: the artifact being installed is fully
# determined by this build's own prior steps, not by a mutable upstream
# version. Every other pip/uv install in these files (and every install of a
# named third-party package anywhere in the repo) is pinned and restricted to
# --only-binary=:all: - see the Dockerfiles themselves for details.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.e1.resourceKey=Docker/dev/Dockerfile

sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.e2.resourceKey=Docker/mcp/dev/Dockerfile

sonar.issue.ignore.multicriteria.e3.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.e3.resourceKey=tools/mock_remote_ocr/scalable/Dockerfile

sonar.issue.ignore.multicriteria.e4.ruleKey=docker:S8544
